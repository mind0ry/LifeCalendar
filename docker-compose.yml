services:

  backend:
    image: ${DOCKER_USERNAME}/myweb-backend:latest
    container_name: myweb-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/myweb_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"
    restart: always

  frontend:
    image: ${DOCKER_USERNAME}/myweb-frontend:latest
    container_name: myweb-frontend
    ports:
      - "5173:3000"
    depends_on:
      - backend
    restart: always

  # Docker Hub에 새 이미지가 올라오면 자동으로 pull + 재시작
  watchtower:
    image: containrrr/watchtower
    container_name: myweb-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: 60        # 60초마다 체크
      WATCHTOWER_CLEANUP: "true"          # 구버전 이미지 자동 삭제
    restart: always
