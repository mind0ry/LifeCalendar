name: CI/CD — Build & Push to Docker Hub

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Java 빌드 (네이티브, 빠름) ──────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build Backend JAR
        run: |
          cd myweb-backend
          chmod +x gradlew
          ./gradlew bootJar -x test

      # ── 2. React 빌드 (네이티브, 빠름) ─────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: myweb-frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd myweb-frontend
          npm install
          npm run build

      # ── 3. QEMU + Buildx (파일 복사만 하므로 빠름) ─────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./myweb-backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/myweb-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./myweb-frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/myweb-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
