name: CI/CD — Build & Push to Docker Hub

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 코드 체크아웃 ────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. QEMU 설정 (arm64 크로스 컴파일 에뮬레이터) ─
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Docker Buildx 설정 ───────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Docker Hub 로그인 ────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── 5. Backend 멀티 플랫폼 빌드 & Push ──────────
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./myweb-backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/myweb-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Frontend 멀티 플랫폼 빌드 & Push ─────────
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./myweb-frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/myweb-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
