name: CI/CD — Build & Push to Docker Hub

on:
  push:
    branches: [main]   # main 브랜치에 push될 때만 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 코드 체크아웃 ────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Docker Hub 로그인 ────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── 3. Docker Buildx 설정 (멀티 플랫폼 지원) ───
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Backend 이미지 빌드 & Push ───────────────
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./myweb-backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/myweb-backend:latest
          cache-from: type=gha      # GitHub Actions 캐시로 빌드 속도 향상
          cache-to: type=gha,mode=max

      # ── 5. Frontend 이미지 빌드 & Push ──────────────
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./myweb-frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/myweb-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
